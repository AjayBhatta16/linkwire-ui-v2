<div class="d-flex flex-column align-items-center mt-5">
    <h3 class="mt-5 mb-4">{{ headerText }}</h3>
    <div class="mt-4 mb-4">
        <svg width="100" height="100" viewBox="0 0 64 64" aria-hidden="true">
            <circle cx="32" cy="32" r="30" fill="#fff1f2" stroke="#ef4444" stroke-width="4" />
            <line x1="20" y1="20" x2="44" y2="44" stroke="#dc2626" stroke-width="6" stroke-linecap="round" />
            <line x1="44" y1="20" x2="20" y2="44" stroke="#dc2626" stroke-width="6" stroke-linecap="round" />
        </svg>
    </div>
    <h6 
        class="mt-4 text-center" 
        [innerHTML]="errorDetailMessage.split('\n').join('<br/><br/>')"
    ></h6>
</div>
