<h2 class="text-center" mat-dialog-title>Terms & Conditions</h2>
<mat-dialog-content>
  <form [formGroup]="form">
    <div class="w-75 mx-auto">
        <p>In order to continue, you must agree to our latest terms & conditions and privacy policy.</p>
        <mat-checkbox formControlName="agreedToLatestTerms">
            I agree to the <a href="/terms_and_conditions.pdf" target="_blank">terms and conditions</a> and <a href="/privacy_policy.pdf" target="_blank">privacy policy</a>.
        </mat-checkbox>
    </div>
  </form>
</mat-dialog-content>
<mat-dialog-actions>
  <button 
    mat-raised-button 
    mat-dialog-close
    color="primary"
  >Cancel</button>
  <button 
    mat-raised-button
    color="primary"
    (click)="onSubmit()"
  >Save</button>
</mat-dialog-actions>
