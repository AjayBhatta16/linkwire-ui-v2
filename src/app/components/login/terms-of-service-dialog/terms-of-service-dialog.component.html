<h2 class="text-center" mat-dialog-title>Terms & Conditions</h2>
<mat-dialog-content>
  <form [formGroup]="form">
    <div class="w-75 mx-auto">
        <!-- Insert terms and conditions content here -->
    </div>
  </form>
</mat-dialog-content>
<mat-dialog-actions>
  <button 
    mat-raised-button 
    mat-dialog-close
    color="primary"
  >Cancel</button>
  <button 
    mat-raised-button
    color="primary"
    (click)="onSubmit()"
  >Save</button>
</mat-dialog-actions>
