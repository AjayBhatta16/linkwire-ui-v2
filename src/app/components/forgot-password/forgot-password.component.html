<div class="container-fluid">
    <div class="d-flex flex-column align-items-center mt-5">
        @if (success()) {
            <h3 class="mt-5 mb-4">Success!</h3>
            <div class="mt-4 mb-4">
                <svg width="100" height="100" viewBox="0 0 64 64" aria-hidden="true">
                    <circle cx="32" cy="32" r="30" fill="#e6ffed" stroke="#22c55e" stroke-width="4" />
                    <path d="M18 34l10 10 18-22" fill="none" stroke="#16a34a" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />
                </svg>
            </div>
            <h6 class="mt-4">A password reset link has been sent to your email.</h6>
        }
        @else {
            <h1 class="mb-3">Forgot Password</h1>
            <h6 class="mb-5">Enter your email address to receive a password reset link.</h6>
            <form class="mt-5" [formGroup]="form" (ngSubmit)="onSubmit()">
                <mat-form-field>
                    <input 
                        type="text" 
                        matInput 
                        placeholder="Email Address" 
                        formControlName="email"
                    >
                </mat-form-field>
                <small 
                    class="form-text text-danger mb-2" 
                >
                    {{ (error$ | async) }}
                </small>
                <div class="button">
                        <button 
                            type="submit" 
                            mat-raised-button
                            [disabled]="(loading$ | async)"
                            color="primary"
                        >Request Password Reset</button>
                </div>
            </form>
        }
    </div>
</div>
